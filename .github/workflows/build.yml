name: Build

on:
  workflow_call:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    name: Build Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build (release)
        run: cargo build --release --locked --target x86_64-pc-windows-msvc

      - name: Stage artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item -Force target\x86_64-pc-windows-msvc\release\tise.exe dist\tise-windows-x86_64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/tise-windows-x86_64.exe
          if-no-files-found: error

  build-linux-gnu:
    name: Build Linux glibc (x86_64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binutils \
            libx11-dev \
            libx11-xcb-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Build (release)
        run: cargo build --release --locked

      - name: Stage artifact
        run: |
          mkdir -p dist
          cp target/release/tise dist/tise-linux-x86_64-gnu
          chmod +x dist/tise-linux-x86_64-gnu

      - name: Verify GLIBC compatibility
        shell: bash
        run: |
          set -euo pipefail
          bin="dist/tise-linux-x86_64-gnu"

          echo "::group::ldd output"
          ldd "$bin" || true
          echo "::endgroup::"

          # Determine the newest GLIBC symbol version the binary requires.
          # Building on an older runner keeps this requirement low and maximizes distro compatibility.
          max_glibc=$(objdump -T "$bin" | grep -oE 'GLIBC_[0-9]+\.[0-9]+' | sort -V | tail -n1 || true)
          echo "Max GLIBC required: ${max_glibc:-<none>}"
          if [[ -z "${max_glibc}" ]]; then
            echo "No GLIBC symbol versions found (unexpected for a GNU build)."
            exit 1
          fi

          # ubuntu-22.04 ships glibc 2.35; requiring newer likely breaks older distros.
          allowed="GLIBC_2.35"
          newest=$(printf '%s\n' "$allowed" "$max_glibc" | sort -V | tail -n1)
          if [[ "$newest" != "$allowed" ]]; then
            echo "Binary requires $max_glibc, which is newer than allowed $allowed"
            exit 1
          fi
          echo "OK: $max_glibc <= $allowed"

      - name: Smoke test (headless launch)
        shell: bash
        run: |
          set -euo pipefail
          bin="dist/tise-linux-x86_64-gnu"

          # Install a virtual X server, a software OpenGL renderer (llvmpipe,
          # since CI runners have no GPU), and the runtime GUI libs the binary
          # dlopens at window-creation time. The build step installed the -dev
          # packages for *linking*; these are the *runtime* counterparts that a
          # user's machine would have but a bare runner does not.
          sudo apt-get install -y \
            xvfb \
            libgl1 \
            libegl1 \
            libglx-mesa0 \
            libgl1-mesa-dri \
            libxkbcommon0 \
            libxkbcommon-x11-0 \
            libwayland-client0

          # Layer 1: no-GUI path. Exits before run_gui(), so this only proves
          # the binary loads and its hard-linked deps resolve. Fast + deterministic.
          echo "::group::tise --version (load + no-GUI path)"
          out=$(xvfb-run -a "$bin" --version)
          echo "$out"
          echo "$out" | grep -q '^tise '
          echo "::endgroup::"

          # Layer 2: the real GUI. This is the check that actually exercises the
          # path that broke in v2.0.0 -- eframe creates a winit window and a GL
          # context (libGL/xkbcommon dlopen here, not at --version). If the
          # binary links but can't stand up a window, it panics in the first
          # frame and exits non-zero *before* the timeout. We force software GL
          # so it doesn't need a GPU, run under xvfb, and treat "still alive at
          # the timeout" (exit 124) as success.
          echo "::group::tise GUI launch under xvfb"
          export LIBGL_ALWAYS_SOFTWARE=1
          set +e
          timeout 20 xvfb-run -a "$bin"
          code=$?
          set -e
          echo "exit code: $code"
          echo "::endgroup::"
          if [[ "$code" -eq 124 ]]; then
            echo "OK: GUI stayed up for 20s (window + GL context initialized)"
          else
            echo "FAIL: GUI exited early ($code) -- likely panicked during window/GL init"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-gnu
          path: dist/tise-linux-x86_64-gnu
          if-no-files-found: error
